services:
  - type: web
    name: nexora-anomaly-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABRICKS_HOST
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_SQL_WAREHOUSE_ID
        sync: false
      - key: DATABRICKS_CATALOG
        sync: false
        default: nexora_poc_catalog
      - key: DATABRICKS_SCHEMA_DOMAIN
        value: raw
      - key: PYTHON_VERSION
        value: 3.11.0
